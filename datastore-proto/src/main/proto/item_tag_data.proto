syntax = "proto3";

option java_package = "com.nativeapptemplate.nativeapptemplatefree";
option java_multiple_files = true;

message ItemTagDataProto {
  reserved 5, 7, 11;
  reserved "scan_state", "customer_read_at", "already_completed";

  string id = 1;
  string shop_id = 2;
  string name = 3;
  string state = 4;
  string created_at = 6;
  string description = 8;
  string completed_at = 9;
  string shop_name = 10;
  int32 position = 12;
}
